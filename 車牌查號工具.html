<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>車牌查號工具</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif; background: #f0f4f8; min-height: 100vh; color: #2d3748; }

header { background: linear-gradient(135deg, #1a56db, #0ea5e9); color: white; padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
header .left { display: flex; align-items: center; gap: 10px; }
header .icon { font-size: 24px; }
header h1 { font-size: 19px; font-weight: 700; }
header .subtitle { font-size: 11px; opacity: 0.85; margin-top: 1px; }
#dataInfo { font-size: 12px; opacity: 0.9; text-align: right; }
#dataInfo .badge { display: inline-block; background: rgba(255,255,255,0.2); border-radius: 20px; padding: 2px 10px; margin-top: 3px; font-size: 11px; }

.container { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }

/* 載入中 / 錯誤 */
.loading-card { background: white; border-radius: 14px; padding: 48px 32px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 18px; }
.spinner { width: 44px; height: 44px; border: 4px solid #e2e8f0; border-top-color: #1a56db; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-card { background: #fff5f5; border: 1.5px solid #feb2b2; border-radius: 14px; padding: 24px 28px; text-align: center; margin-bottom: 18px; display: none; }
.error-card p { color: #c53030; font-size: 14px; line-height: 1.8; }
.error-card code { background: #fed7d7; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
.btn-retry { margin-top: 14px; padding: 9px 22px; background: #1a56db; color: white; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; }

/* 已載入列 */
.loaded-bar { background: #f0fdf4; border: 1.5px solid #86efac; border-radius: 10px; padding: 10px 18px; margin-bottom: 18px; display: none; align-items: center; justify-content: space-between; }
.loaded-bar .count { font-weight: 700; color: #16a34a; font-size: 16px; }
.loaded-bar .filename { font-size: 12px; color: #15803d; }
.btn-reload { background: white; border: 1.5px solid #86efac; color: #15803d; padding: 5px 12px; border-radius: 7px; font-size: 12px; cursor: pointer; }
.btn-reload:hover { background: #dcfce7; }

/* 篩選卡片 */
.filter-card { background: white; border-radius: 14px; padding: 20px 22px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 16px; display: none; }
.filter-section { margin-bottom: 16px; }
.filter-section:last-child { margin-bottom: 0; }
.section-label { font-size: 12px; font-weight: 700; color: #475569; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

.row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }

/* 下拉 */
select {
  padding: 8px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px;
  font-size: 13px; outline: none; background: white; cursor: pointer;
  transition: border-color 0.2s;
}
select:focus { border-color: #1a56db; }

/* 輸入框 */
input[type="text"], input[type="number"] {
  padding: 8px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px;
  font-size: 13px; outline: none; transition: border-color 0.2s;
}
input:focus { border-color: #1a56db; box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }

/* 首數按鈕 */
.digit-btns { display: flex; gap: 5px; flex-wrap: wrap; }
.digit-btn {
  width: 34px; height: 34px; border: 1.5px solid #e2e8f0; border-radius: 7px;
  background: white; font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all 0.15s; color: #475569;
}
.digit-btn:hover { border-color: #1a56db; color: #1a56db; background: #eff6ff; }
.digit-btn.active { background: #1a56db; color: white; border-color: #1a56db; }
.digit-btn.clear-btn { width: auto; padding: 0 10px; font-size: 12px; color: #94a3b8; border-style: dashed; }
.digit-btn.clear-btn:hover { background: #f8fafc; color: #64748b; }

/* 功能按鈕 */
.func-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.func-btn {
  padding: 6px 14px; border: 1.5px solid #e2e8f0; border-radius: 20px;
  background: white; font-size: 13px; cursor: pointer; transition: all 0.15s;
  color: #475569; white-space: nowrap;
}
.func-btn:hover { border-color: #1a56db; color: #1a56db; background: #eff6ff; }
.func-btn.active { background: #1a56db; color: white; border-color: #1a56db; }

/* 操作按鈕 */
.action-row { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
.btn-search { padding: 9px 28px; background: linear-gradient(135deg, #1a56db, #0ea5e9); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-search:hover { opacity: 0.88; }
.btn-reset { padding: 9px 16px; background: #f1f5f9; color: #64748b; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 13px; cursor: pointer; }
.btn-reset:hover { background: #e2e8f0; }
.result-hint { font-size: 12px; color: #94a3b8; }

/* 狀態 & 結果 */
.status-bar { background: white; border-radius: 10px; padding: 9px 16px; margin-bottom: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); font-size: 13px; color: #475569; display: none; }
.status-bar .count { font-weight: 700; color: #1a56db; font-size: 15px; }
.result-card { background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.07); display: none; }
table { width: 100%; border-collapse: collapse; }
thead { background: #1e40af; }
thead th { padding: 10px 14px; color: white; font-size: 12px; font-weight: 600; text-align: left; }
tbody tr { border-bottom: 1px solid #f1f5f9; }
tbody tr:hover { background: #eff6ff; }
tbody td { padding: 9px 14px; font-size: 13px; }
.highlight { background: #fef9c3; border-radius: 3px; padding: 0 2px; }
.no-result { text-align: center; padding: 50px 20px; color: #94a3b8; }
.no-result .icon { font-size: 40px; margin-bottom: 10px; }

.tag { display: inline-block; background: #eff6ff; color: #1a56db; border-radius: 4px; padding: 1px 6px; font-size: 11px; font-weight: 600; margin-left: 4px; }
</style>
</head>
<body>

<header>
  <div class="left">
    <div class="icon">🚗</div>
    <div><h1>車牌查號工具</h1><div class="subtitle">車牌資料快速查詢系統</div></div>
  </div>
  <div id="dataInfo" style="display:none">
    <div id="headerCount"></div>
    <div class="badge" id="headerFile"></div>
  </div>
</header>

<div class="container">

  <div class="loading-card" id="loadingCard">
    <div class="spinner"></div>
    <strong>自動載入資料中...</strong>
    <p style="margin-top:6px;color:#64748b;font-size:14px">正在讀取最新的 car_tags.csv</p>
  </div>

  <div class="error-card" id="errorCard">
    <p id="errorMsg"></p>
    <button class="btn-retry" onclick="loadData()">🔄 重新嘗試</button>
  </div>

  <div class="loaded-bar" id="loadedBar">
    <div>
      <span>✅ </span>
      <span class="count" id="loadedCount"></span>
      <span style="font-size:13px;color:#15803d"> 筆資料已載入</span>
      <div class="filename" id="loadedFile"></div>
    </div>
    <button class="btn-reload" onclick="loadData()">🔄 重新載入</button>
  </div>

  <!-- 篩選區 -->
  <div class="filter-card" id="filterCard">

    <!-- 第一列：單位 + 首數 + 加總 + 排除 -->
    <div class="filter-section">
      <div class="row">
        <div>
          <div class="section-label">① 篩選單位</div>
          <select id="selUnit" onchange="doSearch()">
            <option value="">全部單位</option>
          </select>
        </div>
        <div>
          <div class="section-label">② 號碼首數</div>
          <div class="digit-btns" id="digitBtns">
            <button class="digit-btn clear-btn" onclick="setDigit(null)">不限</button>
          </div>
        </div>
        <div>
          <div class="section-label">③ 數字加總</div>
          <select id="selSum" onchange="doSearch()">
            <option value="">不限</option>
          </select>
        </div>
        <div>
          <div class="section-label">④ 排除號碼（逗號分隔）</div>
          <input type="text" id="inputExclude" placeholder="例：4、49、444" style="width:180px" oninput="doSearch()">
        </div>
      </div>
    </div>

    <!-- 第二列：功能查找 -->
    <div class="filter-section">
      <div class="section-label">⑤ 功能查找（可多選）</div>
      <div class="func-btns">
        <button class="func-btn" data-func="流標牌"   onclick="toggleFunc(this)">流標牌</button>
        <button class="func-btn" data-func="數字漸大" onclick="toggleFunc(this)">數字漸大</button>
        <button class="func-btn" data-func="數字漸小" onclick="toggleFunc(this)">數字漸小</button>
        <button class="func-btn" data-func="雙同數"   onclick="toggleFunc(this)">雙同數</button>
        <button class="func-btn" data-func="三同數"   onclick="toggleFunc(this)">三同數</button>
        <button class="func-btn" data-func="疊數"     onclick="toggleFunc(this)">疊數</button>
        <button class="func-btn" data-func="雙疊數"   onclick="toggleFunc(this)">雙疊數</button>
        <button class="func-btn" data-func="三疊數"   onclick="toggleFunc(this)">三疊數</button>
      </div>
    </div>

    <!-- 操作 -->
    <div class="action-row">
      <button class="btn-search" onclick="doSearch()">🔍 查詢</button>
      <button class="btn-reset" onclick="resetAll()">✕ 清除所有條件</button>
      <span class="result-hint" id="resultHint"></span>
    </div>
  </div>

  <!-- 狀態 -->
  <div class="status-bar" id="statusBar"><span id="statusText"></span></div>

  <!-- 結果 -->
  <div class="result-card" id="resultCard">
    <table id="resultTable">
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="no-result" id="noResult" style="display:none">
      <div class="icon">🔍</div><p>查無符合資料</p>
    </div>
  </div>

</div>

<script>
let allData = [], columns = [], colMap = {};
let selectedDigit = null;
let activeFuncs = new Set();

// ── 載入資料 ──────────────────────────────────────────
async function loadData() {
  show('loadingCard'); hide('errorCard'); hide('loadedBar'); hide('filterCard'); hide('statusBar'); hide('resultCard');
  try {
    const res = await fetch('http://localhost:8765/api/data');
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || `HTTP ${res.status}`); }
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    columns = data.columns; allData = data.rows;
    initUI(data.filename);
  } catch(e) {
    hide('loadingCard'); show('errorCard');
    document.getElementById('errorMsg').innerHTML =
      `無法載入資料：<strong>${e.message}</strong><br><br>` +
      `請確認已執行 <code>python3 啟動查號工具.py</code>`;
  }
}

// ── 初始化 ────────────────────────────────────────────
function initUI(filename) {
  hide('loadingCard'); hide('errorCard');

  // 欄位對應
  const kw = { '單位':['單位','unit','機關'], '頁面':['頁面','page','頁碼'], '車牌':['車牌','plate','號碼','車號','牌照'], '流標':['流標','auction'] };
  colMap = {};
  for (const [k, syns] of Object.entries(kw))
    colMap[k] = columns.find(c => syns.some(s => c.includes(s))) || '';

  // 單位下拉（唯一值排序）
  const units = [...new Set(allData.map(r => r[colMap['單位']] || '').filter(Boolean))].sort();
  const sel = document.getElementById('selUnit');
  sel.innerHTML = '<option value="">全部單位</option>' + units.map(u => `<option value="${u}">${u}</option>`).join('');

  // 首數按鈕 0-9
  const db = document.getElementById('digitBtns');
  db.innerHTML = '<button class="digit-btn clear-btn active" id="digitAll" onclick="setDigit(null)">不限</button>';
  for (let i = 0; i <= 9; i++) {
    db.innerHTML += `<button class="digit-btn" id="digit${i}" onclick="setDigit(${i})">${i}</button>`;
  }

  // 加總下拉 1-36
  const ss = document.getElementById('selSum');
  ss.innerHTML = '<option value="">不限</option>' + Array.from({length:36},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('');

  // 已載入列
  show('loadedBar', 'flex');
  document.getElementById('loadedCount').textContent = allData.length.toLocaleString();
  document.getElementById('loadedFile').textContent = filename;
  document.getElementById('dataInfo').style.display = 'block';
  document.getElementById('headerCount').textContent = `共 ${allData.length.toLocaleString()} 筆`;
  document.getElementById('headerFile').textContent = filename;

  show('filterCard');
  doSearch();
}

// ── 首數選擇 ──────────────────────────────────────────
function setDigit(d) {
  selectedDigit = d;
  document.querySelectorAll('.digit-btn').forEach(b => b.classList.remove('active'));
  if (d === null) document.getElementById('digitAll').classList.add('active');
  else document.getElementById(`digit${d}`).classList.add('active');
  doSearch();
}

// ── 功能按鈕切換 ──────────────────────────────────────
function toggleFunc(btn) {
  const f = btn.dataset.func;
  if (activeFuncs.has(f)) { activeFuncs.delete(f); btn.classList.remove('active'); }
  else { activeFuncs.add(f); btn.classList.add('active'); }
  doSearch();
}

// ── 取號碼部分（去除字母和符號）─────────────────────
function getNumStr(plate) {
  const m = plate.match(/(\d+)$/);
  return m ? m[1] : plate.replace(/\D/g, '');
}

// ── 數字規律判斷 ──────────────────────────────────────
function numChecks(nums) {
  const d = nums.split('').map(Number);
  const n = d.length;
  if (n < 2) return {};

  // 數字加總
  const sum = d.reduce((a,b) => a+b, 0);

  // 數字漸大：嚴格遞增
  const isAsc = d.every((v,i) => i === 0 || v > d[i-1]);
  // 數字漸小：嚴格遞減
  const isDesc = d.every((v,i) => i === 0 || v < d[i-1]);

  // 各數字出現次數
  const cnt = {};
  d.forEach(v => cnt[v] = (cnt[v]||0)+1);
  const vals = Object.values(cnt);

  // 疊數：全部相同 (1111)
  const isAll = vals.length === 1;
  // 雙疊數：AABB 模式（兩對不同連續相同數字）
  const isDoublePair = n >= 4 && d[0]===d[1] && d[2]===d[3] && d[0]!==d[2];
  // 三疊數：三個連續相同 (AAAB 或 BAAA 或 AABB 中的 AAAB)
  const hasTriple = (d[0]===d[1] && d[1]===d[2]) || (d[1]===d[2] && d[2]===d[3]);
  // 雙同數：有至少一個數字出現恰好2次
  const hasDouble = vals.some(v => v === 2);
  // 三同數：有數字出現恰好3次
  const hasTripleSame = vals.some(v => v === 3);

  return { sum, isAsc, isDesc, isAll, isDoublePair, hasTriple, hasDouble, hasTripleSame };
}

// ── 主搜尋 ────────────────────────────────────────────
function doSearch() {
  const unit    = document.getElementById('selUnit').value;
  const sumVal  = parseInt(document.getElementById('selSum').value) || 0;
  const exclude = document.getElementById('inputExclude').value
                    .split(/[，,、\s]+/).map(s=>s.trim()).filter(Boolean);

  const colUnit  = colMap['單位'];
  const colPlate = colMap['車牌'];
  const col流標  = colMap['流標'];

  const results = allData.filter(row => {
    const plate = (row[colPlate] || '').trim();
    const nums  = getNumStr(plate);

    // ① 單位
    if (unit && (row[colUnit] || '') !== unit) return false;

    // ② 首數
    if (selectedDigit !== null && nums[0] !== String(selectedDigit)) return false;

    // ③ 數字加總
    if (sumVal) {
      const s = nums.split('').reduce((a,c) => a + parseInt(c||0), 0);
      if (s !== sumVal) return false;
    }

    // ④ 排除號碼
    if (exclude.length && exclude.some(ex => nums.includes(ex))) return false;

    // ⑤ 功能查找
    if (activeFuncs.size > 0) {
      const chk = numChecks(nums);
      for (const f of activeFuncs) {
        let pass = false;
        if (f === '流標牌')   pass = col流標 ? !!(row[col流標]) : plate.includes('流標');
        if (f === '數字漸大') pass = chk.isAsc;
        if (f === '數字漸小') pass = chk.isDesc;
        if (f === '雙同數')   pass = chk.hasDouble && !chk.hasTripleSame && !chk.isAll;
        if (f === '三同數')   pass = chk.hasTripleSame && !chk.isAll;
        if (f === '疊數')     pass = chk.isAll;
        if (f === '雙疊數')   pass = chk.isDoublePair;
        if (f === '三疊數')   pass = chk.hasTriple && !chk.isAll;
        if (!pass) return false;
      }
    }

    return true;
  });

  renderResults(results);
}

// ── 重置 ──────────────────────────────────────────────
function resetAll() {
  document.getElementById('selUnit').value = '';
  document.getElementById('selSum').value = '';
  document.getElementById('inputExclude').value = '';
  setDigit(null);
  activeFuncs.clear();
  document.querySelectorAll('.func-btn').forEach(b => b.classList.remove('active'));
  doSearch();
}

// ── 渲染結果 ──────────────────────────────────────────
function renderResults(results) {
  show('statusBar'); show('resultCard');
  document.getElementById('statusText').innerHTML =
    `共找到 <span class="count">${results.length.toLocaleString()}</span> 筆（總計 ${allData.length.toLocaleString()} 筆）`;

  const dc = columns.filter(c => c !== '抓取時間');
  if (columns.includes('抓取時間')) dc.push('抓取時間');
  document.getElementById('tableHead').innerHTML = '<tr>' + dc.map(c=>`<th>${c}</th>`).join('') + '</tr>';

  if (!results.length) {
    document.getElementById('resultTable').style.display = 'none';
    document.getElementById('noResult').style.display = 'block';
    return;
  }
  document.getElementById('resultTable').style.display = 'table';
  document.getElementById('noResult').style.display = 'none';

  const display = results.slice(0, 5000);
  document.getElementById('tableBody').innerHTML = display.map(row =>
    '<tr>' + dc.map(c => `<td>${escapeHtml(row[c]||'')}</td>`).join('') + '</tr>'
  ).join('');

  if (results.length > 5000) {
    document.getElementById('tableBody').innerHTML +=
      `<tr><td colspan="${dc.length}" style="text-align:center;color:#94a3b8;padding:12px;font-size:12px">
        ⚠️ 超過 5,000 筆，僅顯示前 5,000 筆，請縮小條件
      </td></tr>`;
  }
}

function show(id, d='block') { document.getElementById(id).style.display = d; }
function hide(id) { document.getElementById(id).style.display = 'none'; }
function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

window.addEventListener('load', loadData);
</script>
</body>
</html>
